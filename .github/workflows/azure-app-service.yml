name: Deploy Azure App Service

on:
  workflow_dispatch:
    inputs:
      target:
        description: Choose which app service(s) to deploy
        required: true
        type: choice
        default: all
        options:
          - all
          - web
          - agent

permissions:
  contents: read

concurrency:
  group: azure-app-service-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        if: ${{ inputs.target == 'all' || inputs.target == 'web' }}
        run: npm run build:web

      # API deploys live in deploy-api.yml (push-triggered + dispatch). This
      # combined workflow covers web and the code-deploy agent path only.
      - name: Deploy web app
        if: ${{ inputs.target == 'all' || inputs.target == 'web' }}
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME_WEB }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_WEB }}
          package: apps/web # workspace package root; tsconfig is self-contained

      # The Python agent service ships PyTorch (RAG) and is best deployed as a
      # container using services/agent/Dockerfile (App Service for Containers or
      # Azure Container Apps). scripts/azure/provision.sh provisions it that way.
      # This code-deploy path works for a no-RAG agent (core requirements only).
      - name: Deploy agent service
        if: ${{ inputs.target == 'all' || inputs.target == 'agent' }}
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME_AGENT }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_AGENT }}
          package: services/agent
