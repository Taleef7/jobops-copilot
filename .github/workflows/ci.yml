name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repo checks
        env:
          CI: true
        run: npm run check

      - name: Run tests
        env:
          CI: true
        run: npm test

  db:
    name: Postgres stores (real DB)
    runs-on: ubuntu-latest
    # Runs the *.postgres.ts stores against a real pgvector Postgres — the tenancy SQL
    # (`where user_id = $1`) that every file-mode store test skips. See src/data/*.pgtest.ts.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/jobops_test
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npm run db:init --workspace @jobops/api

      - name: Postgres store tenancy tests
        run: npm run test:pg --workspace @jobops/api

  agent:
    name: Agent service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/agent/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app evals tests

      - name: Test (pytest)
        run: pytest

  mcp:
    name: MCP server (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/mcp
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/mcp/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest

  infra:
    name: Infra (Bicep)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Compile the Bicep to ARM — fails on any template error. No Azure login
      # needed (az + Bicep ship on the GitHub-hosted runner).
      - name: Validate Bicep
        run: |
          az bicep build --file infra/main.bicep --stdout > /dev/null
          az bicep build-params --file infra/main.bicepparam --outfile /dev/null

  e2e:
    name: Web e2e (Playwright)
    runs-on: ubuntu-latest
    # The Next.js app needs Clerk keys to boot, so this runs only when they're
    # configured as secrets; otherwise it skips (the job still succeeds — no gate
    # failure for a fork/PR without secrets). Mirrors the evals key-gating.
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Gate on Clerk secrets
        id: gate
        run: |
          if [ -n "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ] && [ -n "$CLERK_SECRET_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Clerk secrets not configured — skipping web e2e."
          fi

      - name: Set up Node.js
        if: steps.gate.outputs.ready == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.ready == 'true'
        run: npm ci

      - name: Install Playwright browser
        if: steps.gate.outputs.ready == 'true'
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run e2e
        if: steps.gate.outputs.ready == 'true'
        env:
          CI: true
        run: npm run test:e2e

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Gate on CRITICAL advisories only (0 today). Dependabot handles high/moderate as
      # PRs so this never blocks a merge on a pre-existing transitive advisory, while a
      # newly-introduced critical fails the build.
      - name: npm audit (critical)
        run: npm audit --audit-level=critical
