name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repo checks
        env:
          CI: true
        run: npm run check

      - name: Run tests
        env:
          CI: true
        run: npm test

  agent:
    name: Agent service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/agent/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app evals tests

      - name: Test (pytest)
        run: pytest

  mcp:
    name: MCP server (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/mcp
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/mcp/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest

  infra:
    name: Infra (Bicep)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Compile the Bicep to ARM — fails on any template error. No Azure login
      # needed (az + Bicep ship on the GitHub-hosted runner).
      - name: Validate Bicep
        run: |
          az bicep build --file infra/main.bicep --stdout > /dev/null
          az bicep build-params --file infra/main.bicepparam --outfile /dev/null

  e2e:
    name: Web e2e (Playwright)
    runs-on: ubuntu-latest
    # The Next.js app needs Clerk keys to boot, so this runs only when they're
    # configured as secrets; otherwise it skips (the job still succeeds — no gate
    # failure for a fork/PR without secrets). Mirrors the evals key-gating.
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Gate on Clerk secrets
        id: gate
        run: |
          if [ -n "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ] && [ -n "$CLERK_SECRET_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Clerk secrets not configured — skipping web e2e."
          fi

      - name: Set up Node.js
        if: steps.gate.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.ready == 'true'
        run: npm ci

      - name: Install Playwright browser
        if: steps.gate.outputs.ready == 'true'
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run e2e
        if: steps.gate.outputs.ready == 'true'
        env:
          CI: true
        run: npm run test:e2e
